# pg_hba.conf — Bojemoi Lab
# SSL obligatoire pour toutes les connexions réseau

# Connexions locales (socket unix) — pas de SSL
local   all   all                       trust

# Loopback — SSL non disponible sur loopback, password suffisant
host    all   all   127.0.0.1/32        scram-sha-256
host    all   all   ::1/128             scram-sha-256

# Docker overlay networks (10.x.x.x) — pas de SSL (overlay chiffré au niveau réseau)
host    all   all   10.0.0.0/8          scram-sha-256

# Docker bridge (172.16.x.x - 172.31.x.x) — pas de SSL (trafic local host)
host    all   all   172.16.0.0/12       scram-sha-256

# LAN local (192.168.x.x) — SSL + certificat client obligatoire
hostssl all   all   192.168.0.0/16      scram-sha-256  clientcert=verify-full

# Tout le reste — refusé
host    all   all   0.0.0.0/0           reject
host    all   all   ::/0                reject
