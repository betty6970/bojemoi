global:
  # Configuration SMTP Proton Mail Bridge
  # Temps avant de d..clarer une alerte comme r..solue si elle
  resolve_timeout: 5m
  # Configuration SMTP (Email)
  smtp_from: 'betty.bombers@proton.me'
  smtp_smarthost: 'protonmail-bridge:25'
  smtp_auth_username: 'betty.bombers@proton.me'
  smtp_auth_password_file: /run/secrets/alertmanager_smtp_pass
  smtp_require_tls: true

route:
  receiver: 'default'
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 6h
  repeat_interval: 12h
  routes:
    # Toutes les alertes → alert-agent LLM (continue = ne bloque pas les autres)
    - receiver: 'alert-agent'
      continue: true
    # Alertes périmètre → Telegram immédiat (pas de délai)
    - receiver: 'telegram-perimeter'
      match:
        component: perimeter
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 30m
      continue: true
    - receiver: 'default'
      continue: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']

receivers:
  - name: 'alert-agent'
    webhook_configs:
      - url: 'http://alert-agent:8002/webhook'
        send_resolved: false

  - name: 'telegram-perimeter'
    telegram_configs:
      - bot_token_file: /run/secrets/telegram_bot_token
        chat_id: -5087117106
        parse_mode: 'HTML'
        message: |
          {{ if eq .Status "firing" }}🚨{{ else }}✅{{ end }} <b>{{ .CommonLabels.alertname }}</b>
          {{ range .Alerts }}
          {{ if eq .Status "firing" }}
          📍 <b>Capteur:</b> {{ .Labels.esp32_id | default "N/A" }}
          📡 <b>Type:</b> {{ .Labels.type | default "N/A" }}
          ⚠️ {{ .Annotations.summary }}
          📝 {{ .Annotations.description }}
          🕐 Depuis: {{ .StartsAt | since }}
          {{ else }}
          ✅ Résolu — {{ .Annotations.summary }}
          🕐 Durée: {{ .StartsAt | since }}
          {{ end }}
          {{ end }}
        send_resolved: true

  - name: 'default'
    email_configs:
      - to: 'betty.bombers@proton.me'
        from: 'betty.bombers@proton.me'
        send_resolved: true
        headers:
          Subject: '{{ .Status | toUpper }} [{{ .CommonLabels.alertname }}] {{ .CommonLabels.instance }}'
        html: |
          <!DOCTYPE html>
          <html>
          <body>
            <h2>{{ .Status | toUpper }}</h2>
            {{ range .Alerts }}
            <h3>{{ .Labels.alertname }}</h3>
            <p><strong>Severity:</strong> {{ .Labels.severity }}</p>
            <p><strong>Instance:</strong> {{ .Labels.instance }}</p>
            <p><strong>Summary:</strong> {{ .Annotations.summary }}</p>
            <p><strong>Description:</strong> {{ .Annotations.description }}</p>
            <p><strong>Started:</strong> {{ .StartsAt }}</p>
            {{ if .EndsAt }}<p><strong>Ended:</strong> {{ .EndsAt }}</p>{{ end }}
            <hr>
            {{ end }}
          </body>
          </html>
        tls_config:
          # Réseau Docker interne uniquement — cert auto-signé du bridge
          insecure_skip_verify: true

