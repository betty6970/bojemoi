# Merged stack file: borodino.yml
# Source files: 10-service-oblast.yml, 11-service-zaproxy.yml,
#               50-service-borodino.yml, 50-service-tsushima.yml, 55-service-nuclei.yml,
#               56-service-vulnx.yml, 60-service-samsonov.yml, 70-service-zarovnik.yml
#--------------------------------------------------------------------------------

# =====================================
# YAML ANCHORS & ALIASES
# =====================================

# DefectDojo shared environment
x-dojo-env: &dojo-env
  DD_CELERY_BROKER_URL: redis://redis:6379/1
  DD_ALLOWED_HOSTS: "defectdojo,defectdojo-nginx,dojo.bojemoi.lab,localhost,127.0.0.1"
  DD_DEBUG: "False"
  DD_DJANGO_METRICS_ENABLED: "True"
  DD_SAML2_ENABLED: "False"
  DD_SESSION_COOKIE_SECURE: "False"
  DD_CSRF_COOKIE_SECURE: "False"
  DD_SECURE_SSL_REDIRECT: "False"
  DD_TRACK_MIGRATIONS: "True"
  DD_TIME_ZONE: "UTC"
  DD_WHITENOISE: "True"

x-dojo-volumes: &dojo-volumes
  - dojo-media:/app/media
  - dojo-uwsgi-socket:/run/uwsgi

x-dojo-logging: &dojo-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# Template de base avec anchor (from 50-service-borodino.yml)
x-arme-template: &arme-template
  image: ${IMAGE_REGISTRY:-localhost:5000}/borodino:latest
  networks:
    - backend
  environment:
    - PYTHONUNBUFFERED=1
    - MODE_DEBUG=false
    - PG_HOST=postgres
    - PG_PORT=5432
    - PG_USER=${POSTGRES_USER:-postgres}
    - PG_DBNAME=${MSF_DBNAME:-msf}
    - IP2LOC_DBNAME=${IP2LOC_DBNAME:-ip2location}

# Template de deploiement separe
x-deploy-template: &deploy-template
  placement:
    constraints:
      - node.role == worker
    max_replicas_per_node: 5
  restart_policy:
    condition: on-failure
    delay: 5s
    max_attempts: 3
  update_config:
    parallelism: 1
    delay: 10s
    failure_action: rollback
  resources:
    limits:
      cpus: '0.5'
      memory: 512M
    reservations:
      cpus: '0.1'
      memory: 256M

#--------------------------------------------------------------------------------
# NETWORKS
#--------------------------------------------------------------------------------
networks:
  backend:
    external: true
  proxy:
    external: true
  monitoring:
    external: true
  pentest:
    name: pentest
    driver: overlay
    attachable: true
  scan_net:
    name: borodino_scan_net
    driver: overlay
    attachable: false
    ipam:
      config:
        - subnet: 10.11.0.0/24
#--------------------------------------------------------------------------------
# VOLUMES
#--------------------------------------------------------------------------------
volumes:
  # ZAP volumes
  zap-data:
    driver: local
  scan_results:
    driver: local
  scan_logs:
    driver: local
  zap-reports:
    driver: local
    name: zap-reports
  zap-scripts:
    driver: local
    name: zap-scripts

  # Karacho volumes
  karacho-logs:
    driver: local
  karacho-run:
    driver: local

  # Nuclei volumes
  nuclei-templates:
    driver: local
  nuclei-output:
    driver: local
  nuclei-results:
    driver: local

  # DefectDojo volumes
  dojo-uwsgi-socket:
    driver: local
  dojo-media:
    driver: local

  # Nym Mixnet volume
  nym_config:
    driver: local

  # Redis volume
  redis_data:
    driver: local

#--------------------------------------------------------------------------------
# CONFIGS
#--------------------------------------------------------------------------------
configs:
  ptaas_serial:
    external: true
  route_setup_v1:
    external: true

#--------------------------------------------------------------------------------
# SERVICES
#--------------------------------------------------------------------------------
services:

  # =========================================================================
  # FROM: 10-service-oblast.yml - ZAP Proxy
  # =========================================================================
  zaproxy:
    image: ${IMAGE_REGISTRY:-localhost:5000}/oblast:latest
    hostname: zaproxy
    # ports removed - internal pentest service, accessed via overlay network
    cap_add:
      - NET_ADMIN
    environment:
      - ZAP_HOST=0.0.0.0
      - ZAP_PORT=8090
      - TARGET_URL=${TARGET_URL:-https://zap.${LAB_DOMAIN:-bojemoi.lab}}
      - REPORT_FORMAT=html
      - SCAN_GATEWAY_HOST=wg-gateway
    configs:
      - source: route_setup_v1
        target: /usr/bin/route-setup.sh
        mode: 0755
    volumes:
      - zap-data:/zap/wrk
      - zap-reports:/zap/reports
      - scan_logs:/zap/logs
      - type: tmpfs
        target: /home/zap/.ZAP/session
        tmpfs:
          size: 2147483648  # 2 GB cap — auto-cleared on restart
    networks:
      - backend
      - pentest
      - proxy
      - scan_net
    entrypoint: ["/usr/bin/route-setup.sh", "/zap/init-db.sh"]
    command: ["-daemon", "-host", "0.0.0.0", "-port", "8090",
              "-config", "database.driver=org.postgresql.Driver",
              "-config", "api.addrs.addr.name=.*",
              "-config", "api.addrs.addr.regex=true",
              "-config", "api.disablekey=true"]
    dns_search:
      - ${LAB_DOMAIN:-bojemoi.lab}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/JSON/core/view/version/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
      labels:
        - traefik.enable=true
        - traefik.docker.network=proxy
        - traefik.http.routers.zaproxy.rule=Host(`zap.${LAB_DOMAIN:-bojemoi.lab}`)
        - traefik.http.routers.zaproxy.entrypoints=websecure
        - traefik.http.routers.zaproxy.tls=true
        - traefik.http.services.zaproxy.loadbalancer.server.port=8090
  # =========================================================================
  # FROM: 10-service-oblast.yml - ZAP Proxy
  # =========================================================================

  # ZAP Scanner application
  zap-scanner:
    image: ${IMAGE_REGISTRY:-localhost:5000}/oblast-1:latest
    hostname: zap_scanner
    cap_add:
      - NET_ADMIN
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: msf
      DB_USER: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ZAP_HOST: zaproxy
      ZAP_PORT: 8090
      ZAP_API_KEY: ""
      ZAP_CONCURRENCY: 1
      FEED_INTERVAL_SECONDS: 300
      BATCH_SIZE: 50
      DEFECTDOJO_URL: http://defectdojo-nginx:8080
      DEFECTDOJO_PRODUCT: zap
      PYTHONUNBUFFERED: 1
      LOG_LEVEL: INFO
      SCAN_GATEWAY_HOST: wg-gateway
    secrets:
      - postgres_password
      - dojo_api_token
    configs:
      - source: ptaas_serial
        target: /run/configs/ptaas_serial
      - source: route_setup_v1
        target: /usr/bin/route-setup.sh
        mode: 0755
    volumes:
      - scan_logs:/logs
    networks:
      - backend
      - pentest
      - scan_net
    command: ["/usr/bin/route-setup.sh", "python3", "zap_scanner.pyc"]
    dns_search:
      - ${LAB_DOMAIN:-bojemoi.lab}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
      placement:
        constraints:
          - node.role == worker
        max_replicas_per_node: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # =========================================================================
  # FROM: 50-service-borodino.yml - Arme services
  # =========================================================================

  # =========================================================================
  # FROM: 41-service-nym.yml - Nym Mixnet SOCKS5 proxy
  # =========================================================================
  nym-proxy:
    image: ${IMAGE_REGISTRY:-localhost:5000}/nym-proxy:latest
    hostname: nym-proxy
    networks:
      - scan_net
    environment:
      - NYM_ID=${NYM_ID:-bojemoi-lab}
      - NYM_PROVIDER=${NYM_PROVIDER:-}
      - NYM_PORT=1080
    volumes:
      - nym_config:/root/.nym
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "1080"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
        max_replicas_per_node: 1
      restart_policy:
        condition: on-failure
        delay: 15s
        max_attempts: 5
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  wg-gateway:
    image: ${IMAGE_REGISTRY:-localhost:5000}/wg-gateway:latest
    networks:
      - scan_net
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv4.ip_forward: "1"
    secrets:
      - protonvpn_ovpn
      - protonvpn_auth
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      endpoint_mode: dnsrr
      replicas: 1
      placement:
        constraints:
          - node.role == worker
        max_replicas_per_node: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          cpus: '0.2'
          memory: 128M

  ak47-service:
    <<: *arme-template
    networks:
      - backend
      - scan_net
    cap_add:
      - NET_ADMIN
    environment:
      - PYTHONUNBUFFERED=1
      - MODE_DEBUG=true
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_DBNAME=msf
      - IP2LOC_DBNAME=ip2location
      - ARME_TYPE=ak47
      - TARGET=container1
      - SCAN_GATEWAY_HOST=wg-gateway
      - MSF_HOST=msf-teamserver
      - MSF_PORT=55553
    secrets:
      - postgres_password
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      <<: *deploy-template
      replicas: ${AK47_REPLICAS:-5}
      placement:
        constraints:
          - node.role == worker
          - node.labels.defectdojo != true
          - node.labels.nvidia.vgpu != true
        max_replicas_per_node: 5
    command: ["/usr/bin/route-setup.sh", "/usr/bin/thearm_ak47"]

  bm12-service:
    <<: *arme-template
    networks:
      - backend
      - scan_net
    cap_add:
      - NET_ADMIN
    environment:
      - PYTHONUNBUFFERED=1
      - MODE_DEBUG=true
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_DBNAME=msf
      - IP2LOC_DBNAME=ip2location
      - ARME_TYPE=bm12
      - TARGET=container1
      - SCAN_GATEWAY_HOST=wg-gateway
      # Nym Mixnet: anonymise les appels HTTP OSINT (AbuseIPDB, VT, Shodan)
      # Requiert requests[socks] (PySocks) dans l'image borodino
      - ALL_PROXY=${NYM_PROXY:-}
      # API keys OSINT optionnelles (laisser vide si non disponibles)
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY:-}
      - SHODAN_API_KEY=${SHODAN_API_KEY:-}
    secrets:
      - postgres_password
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      <<: *deploy-template
      replicas: ${BM12_REPLICAS:-15}
      placement:
        constraints:
          - node.role == worker
          - node.labels.defectdojo != true
          - node.labels.nvidia.vgpu != true
        max_replicas_per_node: 5
    command: ["/usr/bin/route-setup.sh", "/usr/bin/thearm_bm12"]
  ########################################################
  #
  ########################################################
  msf-teamserver:
    image: ${IMAGE_REGISTRY:-localhost:5000}/borodino-msf:latest
    environment:
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_DBNAME=msf
      # ── Ruby GC tuning — réduit la pression mémoire de msfrpcd ──
      # GC déclenché plus souvent, croissance du heap bridée
      - RUBY_GC_HEAP_GROWTH_FACTOR=1.1
      - RUBY_GC_HEAP_FREE_SLOTS_MIN_RATIO=0.20
      - RUBY_GC_MALLOC_LIMIT=16777216
      - RUBY_GC_MALLOC_LIMIT_MAX=67108864
    secrets:
      - postgres_password
    networks:
      - backend
      - pentest
      - proxy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
        max_replicas_per_node: 1
      restart_policy:
        condition: on-failure
        delay: 30s
        max_attempts: 3
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 1G
      labels:
        - traefik.enable=true
        - traefik.docker.network=proxy
        - traefik.tcp.routers.meterpreter.rule=HostSNI(`*`)
        - traefik.tcp.routers.meterpreter.entrypoints=meterpreter
        - traefik.tcp.services.meterpreter.loadbalancer.server.port=4444
    command: /usr/bin/start_msf_server.sh
  ########################################################
  #
  ########################################################

  uzi-service:
    <<: *arme-template
    image: ${IMAGE_REGISTRY:-localhost:5000}/borodino-msf:latest
    networks:
      - backend
      - pentest
      - scan_net
    cap_add:
      - NET_ADMIN
    environment:
      - ARME_TYPE=uzi
      - TARGET=container1
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_DBNAME=msf
      # MSF_HOST : hostname du service msf-teamserver (réseau pentest/backend)
      - MSF_HOST=msf-teamserver
      # C2_REDIRECTORS : IPs publiques des redirecteurs (virgule), ex: 1.2.3.4,5.6.7.8
      # Mettre à jour après fly ips allocate-v4 + provision-redirector.sh
      - C2_REDIRECTORS=${C2_REDIRECTORS:-}
      - LPORT=24444
      - LPORT_BIND=4444
      - BIND_PORT=5556
      - MODE_DEBUG=true
      # ── Brute-force wordlists — SecLists Default-Credentials (user:pass) ──
      # OS/app defaults en premier, puis ssh-betterdefaultpasslist en fallback
      - SSH_USERPASS_FILE=/opt/bojemoi/SecLists/Passwords/Default-Credentials/os-app-defaults.txt
      - SSH_USERPASS_FILE_EXTRA=/opt/bojemoi/SecLists/Passwords/Default-Credentials/ssh-betterdefaultpasslist.txt
      - SSH_USER_FILE=/opt/bojemoi/SecLists/Usernames/cirt-default-usernames.txt
      - SSH_PASS_FILE=/opt/bojemoi/SecLists/Passwords/Common-Credentials/10k-most-common.txt
      - SSH_BRUTE_TIMEOUT=300
      - SSH_THREADS=4
      - FTP_USERPASS_FILE=/opt/bojemoi/SecLists/Passwords/Default-Credentials/ftp-betterdefaultpasslist.txt
      - FTP_USER_FILE=/opt/bojemoi/SecLists/Usernames/cirt-default-usernames.txt
      - FTP_PASS_FILE=/opt/bojemoi/SecLists/Passwords/Common-Credentials/10k-most-common.txt
      - FTP_BRUTE_TIMEOUT=180
      - TELNET_USERPASS_FILE=/opt/bojemoi/SecLists/Passwords/Default-Credentials/telnet-betterdefaultpasslist.txt
      - TELNET_USER_FILE=/opt/bojemoi/SecLists/Usernames/cirt-default-usernames.txt
      - TELNET_PASS_FILE=/opt/bojemoi/SecLists/Passwords/Common-Credentials/10k-most-common.txt
      - TELNET_BRUTE_TIMEOUT=180
      - MYSQL_USERPASS_FILE=/opt/bojemoi/SecLists/Passwords/Default-Credentials/mysql-betterdefaultpasslist.txt
      - MYSQL_USER_FILE=/opt/bojemoi/SecLists/Usernames/cirt-default-usernames.txt
      - MYSQL_PASS_FILE=/opt/bojemoi/SecLists/Passwords/Common-Credentials/10k-most-common.txt
      - MYSQL_BRUTE_TIMEOUT=180
      - PGSQL_USERPASS_FILE=/opt/bojemoi/SecLists/Passwords/Default-Credentials/postgres-betterdefaultpasslist.txt
      - PGSQL_USER_FILE=/opt/bojemoi/SecLists/Usernames/cirt-default-usernames.txt
      - PGSQL_PASS_FILE=/opt/bojemoi/SecLists/Passwords/Common-Credentials/10k-most-common.txt
      - PGSQL_BRUTE_TIMEOUT=180
      - MSSQL_USERPASS_FILE=/opt/bojemoi/SecLists/Passwords/Default-Credentials/mssql-betterdefaultpasslist.txt
      - MSSQL_USER_FILE=/opt/bojemoi/SecLists/Usernames/cirt-default-usernames.txt
      - MSSQL_PASS_FILE=/opt/bojemoi/SecLists/Passwords/Common-Credentials/10k-most-common.txt
      - MSSQL_BRUTE_TIMEOUT=180
      - TOMCAT_USERPASS_FILE=/opt/bojemoi/SecLists/Passwords/Default-Credentials/tomcat-betterdefaultpasslist.txt
      - TOMCAT_USER_FILE=/opt/bojemoi/SecLists/Usernames/cirt-default-usernames.txt
      - TOMCAT_PASS_FILE=/opt/bojemoi/SecLists/Passwords/Common-Credentials/10k-most-common.txt
      - TOMCAT_BRUTE_TIMEOUT=120
      # ── Brute-force wordlists — SecLists génériques ──
      - SMB_USER_FILE=/opt/bojemoi/SecLists/Usernames/cirt-default-usernames.txt
      - SMB_PASS_FILE=/opt/bojemoi/SecLists/Passwords/Common-Credentials/10k-most-common.txt
      - SMB_BRUTE_TIMEOUT=300
      - IMAP_USER_FILE=/opt/bojemoi/SecLists/Usernames/cirt-default-usernames.txt
      - IMAP_PASS_FILE=/opt/bojemoi/SecLists/Passwords/Common-Credentials/10k-most-common.txt
      - IMAP_BRUTE_TIMEOUT=120
      - POP3_USER_FILE=/opt/bojemoi/SecLists/Usernames/cirt-default-usernames.txt
      - POP3_PASS_FILE=/opt/bojemoi/SecLists/Passwords/Common-Credentials/10k-most-common.txt
      - POP3_BRUTE_TIMEOUT=120
      - SMTP_USER_FILE=/opt/bojemoi/SecLists/Usernames/cirt-default-usernames.txt
      - SMTP_ENUM_TIMEOUT=120
      - HTTP_USER_FILE=/opt/bojemoi/SecLists/Usernames/cirt-default-usernames.txt
      - HTTP_PASS_FILE=/opt/bojemoi/SecLists/Passwords/Common-Credentials/10k-most-common.txt
      - HTTP_BRUTE_TIMEOUT=120
      - MONGO_USER_FILE=/opt/bojemoi/SecLists/Usernames/cirt-default-usernames.txt
      - MONGO_PASS_FILE=/opt/bojemoi/SecLists/Passwords/Common-Credentials/10k-most-common.txt
      - MONGO_BRUTE_TIMEOUT=120
      # ── Pass-only ──
      - VNC_PASS_FILE=/opt/bojemoi/SecLists/Passwords/Default-Credentials/vnc-betterdefaultpasslist.txt
      - VNC_BRUTE_TIMEOUT=120
      - SNMP_COMMUNITY_FILE=/usr/share/metasploit-framework/data/wordlists/snmp_default_pass.txt
      - SNMP_BRUTE_TIMEOUT=60
      - DEFECTDOJO_URL=http://defectdojo-nginx:8080
      - DEFECTDOJO_PRODUCT=uzi
      - SCAN_GATEWAY_HOST=wg-gateway
    secrets:
      - postgres_password
      - dojo_api_token
      - telegram_bot_token
      - telegram_alert_chat_id
      - anthropic_api_key
    configs:
      - source: ptaas_serial
        target: /run/configs/ptaas_serial
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      <<: *deploy-template
      replicas: ${UZI_REPLICAS:-3}
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 30s
        max_attempts: 3
      resources:
        limits:
          cpus: '1.0'
          memory: 1536M
        reservations:
          cpus: '0.2'
          memory: 512M
    volumes:
      - type: bind
        source: /opt/bojemoi/SecLists
        target: /opt/bojemoi/SecLists
        read_only: true
    command: ["/usr/bin/route-setup.sh", "/usr/bin/start_uzi.sh"]

  karacho-blockchain:
    image: ${IMAGE_REGISTRY:-localhost:5000}/karacho:latest
    volumes:
      - karacho-logs:/var/log/karacho
      - karacho-run:/var/run/karacho
    # ports removed - internal blockchain service
    entrypoint: /bin/sh
    command:
      - -c
      - |
        export DB_PASS=$$(cat /run/secrets/postgres_password 2>/dev/null)
        export SECRET_KEY=$$(cat /run/secrets/karacho_secret_key 2>/dev/null)
        exec python3 /usr/local/karacho/blockchain_postgres_api.pyc
    environment:
      - DEBUG=false
      - TOKEN_EXPIRY=3600
      - PORT=5100
      - POSTGRES_HOST=postgres
      - DB_USER=postgres
      - DB_NAME=karacho
      - MSF_DB_NAME=msf
    secrets:
      - postgres_password
      - karacho_secret_key
    networks:
      - backend
      - proxy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      resources:
        limits:
          cpus: '1'
          memory: 2G
      labels:
        - traefik.enable=true
        - traefik.docker.network=proxy
        - traefik.http.routers.karacho.rule=Host(`karacho.${LAB_DOMAIN:-bojemoi.lab}`)
        - traefik.http.routers.karacho.entrypoints=websecure
        - traefik.http.routers.karacho.tls=true
        - traefik.http.services.karacho.loadbalancer.server.port=5100

  # =========================================================================
  # FROM: 50-service-tsushima.yml - Masscan Scanner
  # =========================================================================
  masscan-scanner:
    image: ${IMAGE_REGISTRY:-localhost:5000}/tsushima:latest
    networks:
      - backend
      - scan_net
    cap_add:
      - NET_ADMIN
    configs:
      - source: route_setup_v1
        target: /usr/bin/route-setup.sh
        mode: 0755
    volumes:
      - /etc/openvpn/:/etc/openvpn/
    environment:
      TARGET_COUNTRY: ${TARGET_COUNTRY:-RU}
      TARGET_ISP: ${TARGET_ISP:-}
      SCAN_PORTS: ${SCAN_PORTS:-22,80,443,3389,5985,8080,8443}
      SCAN_RATE: ${SCAN_RATE:-10000}
      MAX_CIDRS: ${MAX_CIDRS:-50}
      IP2LOCATION_DB_HOST: postgres
      IP2LOCATION_DB_PORT: 5432
      IP2LOCATION_DB_NAME: ip2location
      IP2LOCATION_DB_USER: postgres
      MSF_DB_HOST: postgres
      MSF_DB_PORT: 5432
      MSF_DB_NAME: msf
      MSF_DB_USER: postgres
      SCAN_GATEWAY_HOST: wg-gateway
    secrets:
      - postgres_password
    entrypoint: ["/usr/bin/route-setup.sh", "/app/entrypoint.sh"]
    command: ["python3", "/app/masscan_msf_script.py"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      mode: global
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # =========================================================================
  # FROM: 55-service-nuclei.yml - Nuclei Scanner
  # =========================================================================
  nuclei:
    image: ${IMAGE_REGISTRY:-localhost:5000}/nuclei:latest
    entrypoint: /bin/sh
    networks:
      - backend
      - pentest
    volumes:
      - nuclei-templates:/root/nuclei-templates
      - nuclei-results:/results
      - ${BOJEMOI_BASE_PATH:-/opt/bojemoi}/volumes/nuclei/config:/root/.config/nuclei
    environment:
      - NUCLEI_TEMPLATES=/root/nuclei-templates
    command:
      - -c
      - nuclei -update-templates && tail -f /dev/null
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  logpull:
    image: ${IMAGE_REGISTRY:-localhost:5000}/borodino:latest
    networks:
      - backend
    volumes:
      - ${FLY_CLI_PATH:-/home/docker/.fly/bin/fly}:/usr/local/bin/fly:ro
      - ${LIGHTSAIL_KEY_PATH:-/home/docker/LightsailDefaultKey-eu-central-1.pem}:/root/.ssh/lightsail.pem:ro
    environment:
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_DBNAME=msf
      - FLY_APP=redirector-1
      - FLY_LOG_LINES=2000
      - LIGHTSAIL_HOST=${LIGHTSAIL_HOST:-${PUBLIC_DOMAIN:-bojemoi.me}}
      - LIGHTSAIL_USER=${LIGHTSAIL_USER:-ec2-user}
      - LIGHTSAIL_KEY=/root/.ssh/lightsail.pem
      - LIGHTSAIL_LOG_LINES=5000
      - LOOP_INTERVAL=3600
    secrets:
      - postgres_password
      - fly_api_token
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.hostname == ${LOGPULL_NODE_HOSTNAME:-meta-76}
      restart_policy:
        condition: on-failure
        delay: 30s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.2'
          memory: 128M
    command: ["python3", "/usr/bin/thearm_logpull"]

  nuclei-worker:
    image: ${IMAGE_REGISTRY:-localhost:5000}/borodino:latest
    networks:
      - backend
      - pentest
      - scan_net
    cap_add:
      - NET_ADMIN
    environment:
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_DBNAME=msf
      - NUCLEI_API_URL=http://nuclei-api:8001
      - NUCLEI_SEVERITY=critical,high,medium
      - NUCLEI_POLL_INTERVAL=15
      - NUCLEI_SCAN_TIMEOUT=1200
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DEFECTDOJO_URL=http://defectdojo-nginx:8080
      - DEFECTDOJO_PRODUCT=nuclei
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_ENABLED=true
      - OLLAMA_MODEL=mistral:7b-instruct
      - OLLAMA_TIMEOUT=30
      - SCAN_GATEWAY_HOST=wg-gateway
    secrets:
      - postgres_password
    configs:
      - source: route_setup_v1
        target: /usr/bin/route-setup.sh
        mode: 0755
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 15s
        max_attempts: 5
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    command: ["/usr/bin/route-setup.sh", "python3", "/usr/bin/thearm_nuclei"]

  nuclei-api:
    image: ${IMAGE_REGISTRY:-localhost:5000}/nuclei-api:latest
    networks:
      - backend
      - pentest
      - proxy
      - scan_net
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv4.ip_forward: "1"
    volumes:
      - nuclei-results:/results
      - nuclei-templates:/root/nuclei-templates
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NUCLEI_HOST=nuclei
      - RESULTS_DIR=/results
      - NUCLEI_TEMPLATES=/root/nuclei-templates
      - DEFECTDOJO_URL=http://defectdojo-nginx:8080
      - DEFECTDOJO_PRODUCT=nuclei
      - SCAN_GATEWAY_HOST=wg-gateway
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_ENABLED=true
      - OLLAMA_MODEL=mistral:7b-instruct
      - OLLAMA_TIMEOUT=120
      # Nym Mixnet: proxy SOCKS5 pour les scans nuclei HTTP
      - NYM_PROXY=${NYM_PROXY:-}
    secrets:
      - dojo_api_token
    configs:
      - source: ptaas_serial
        target: /run/configs/ptaas_serial
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
      labels:
        - traefik.enable=true
        - traefik.docker.network=proxy
        - traefik.http.routers.nuclei-api.rule=Host(`nuclei.${LAB_DOMAIN:-bojemoi.lab}`)
        - traefik.http.routers.nuclei-api.entrypoints=websecure
        - traefik.http.routers.nuclei-api.tls=true
        - traefik.http.services.nuclei-api.loadbalancer.server.port=8001

  # =========================================================================
  # FROM: 60-service-samsonov.yml - Redis
  # =========================================================================
  redis:
    image: ${IMAGE_REGISTRY:-localhost:5000}/redis:alpine
    command: redis-server --appendonly yes --protected-mode no
    networks:
      - pentest
      - backend
    volumes:
      - redis_data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  pentest-orchestrator:
    image: ${IMAGE_REGISTRY:-localhost:5000}/pentest-orchestrator:latest
    volumes:
      - ${BOJEMOI_BASE_PATH:-/opt/bojemoi}/samsonov/pentest_orchestrator:/app
    working_dir: /app
    command: ["--daemon"]
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - pentest
      - backend
    dns_search:
      - ${LAB_DOMAIN:-bojemoi.lab}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  redis-exporter:
    image: ${IMAGE_REGISTRY:-localhost:5000}/redis-exporter:latest
    environment:
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
    networks:
      - pentest
      - monitoring
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      labels:
        - "prometheus.enable=true"
        - "prometheus.port=9121"
        - "prometheus.path=/metrics"
      replicas: 1
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
      placement:
        constraints:
          - node.role == worker

  pentest-exporter:
    image: ${IMAGE_REGISTRY:-localhost:5000}/python:latest
    command: >
      sh -c "pip3 install prometheus_client requests redis &&
             python3 /app/metrics_exporter.py"
    volumes:
      - ${BOJEMOI_BASE_PATH:-/opt/bojemoi}/samsonov/scripts/metrics_exporter.py:/app/metrics_exporter.py
    networks:
      - pentest
      - monitoring
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      labels:
        - "prometheus.enable=true"
        - "prometheus.port=9999"
        - "prometheus.path=/metrics"
      placement:
        constraints:
          - node.role == worker


  redis-commander:
    image: ${IMAGE_REGISTRY:-localhost:5000}/redis-commander:latest
    environment:
      - REDIS_HOSTS=local:redis:6379
    networks:
      - backend
      - proxy
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 10s
      resources:
        limits:
          cpus: '0.2'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M
      labels:
        - traefik.enable=true
        - traefik.docker.network=proxy
        - traefik.http.routers.redis-commander.rule=Host(`redis.${LAB_DOMAIN:-bojemoi.lab}`)
        - traefik.http.routers.redis-commander.entrypoints=websecure
        - traefik.http.routers.redis-commander.tls=true
        - traefik.http.services.redis-commander.loadbalancer.server.port=8081


  # =========================================================================
  # C2 Session Monitor
  # =========================================================================
  c2-monitor:
    image: ${IMAGE_REGISTRY:-localhost:5000}/c2-monitor:latest
    environment:
      MSF_HOST: msf-teamserver
      MSF_PORT: "55553"
      DEFECTDOJO_URL: http://defectdojo-nginx:8080
      METRICS_PORT: "9305"
      POLL_INTERVAL: "30"
    secrets:
      - msf_rpc_password
      - telegram_bot_token
      - telegram_alert_chat_id
      - dojo_api_token
    configs:
      - source: ptaas_serial
        target: /run/configs/ptaas_serial
    networks:
      - pentest
      - backend
      - monitoring
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 10s
      resources:
        limits:
          cpus: '0.2'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M
      labels:
        - "prometheus.enable=true"
        - "prometheus.port=9305"
        - "prometheus.path=/metrics"

  # =========================================================================
  # FROM: 70-service-defectdojo.yml - DefectDojo Vulnerability Management
  # =========================================================================

  # ─── HTTP frontend (nginx → uwsgi socket) ────────────────────────────────────
  defectdojo-nginx:
    image: localhost:5000/defectdojo-nginx:latest
    volumes:
      - dojo-media:/usr/share/nginx/html/media:ro
      - dojo-uwsgi-socket:/run/uwsgi
    networks:
      - backend
      - pentest
      - proxy
    environment:
      NGINX_METRICS_ENABLED: "true"
    logging: *dojo-logging
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.defectdojo == true
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
      labels:
        - traefik.enable=true
        - traefik.docker.network=proxy
        - traefik.http.routers.defectdojo.rule=Host(`dojo.bojemoi.lab`)
        - traefik.http.routers.defectdojo.entrypoints=websecure
        - traefik.http.routers.defectdojo.tls=true
        - traefik.http.services.defectdojo.loadbalancer.server.port=8080

  # ─── Django uWSGI application ─────────────────────────────────────────────────
  defectdojo-uwsgi:
    image: localhost:5000/defectdojo-django:latest
    volumes: *dojo-volumes
    environment: *dojo-env
    secrets:
      - dojo_secret_key
      - postgres_password
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        export DD_SECRET_KEY=$$(cat /run/secrets/dojo_secret_key 2>/dev/null || echo 'changeme-set-dojo_secret_key')
        PG_PASS=$$(cat /run/secrets/postgres_password)
        export DD_DATABASE_URL="postgresql://postgres:$${PG_PASS}@postgres:5432/defectdojo"
        exec /entrypoint-uwsgi.sh
    networks:
      backend:
        aliases:
          - uwsgi
      pentest:
        aliases:
          - uwsgi
    logging: *dojo-logging
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.defectdojo == true
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ─── Celery worker ─────────────────────────────────────────────────────────────
  dojo-celery-worker:
    image: localhost:5000/defectdojo-django:latest
    volumes: *dojo-volumes
    environment: *dojo-env
    secrets:
      - dojo_secret_key
      - postgres_password
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        export DD_SECRET_KEY=$$(cat /run/secrets/dojo_secret_key 2>/dev/null || echo 'changeme-set-dojo_secret_key')
        PG_PASS=$$(cat /run/secrets/postgres_password)
        export DD_DATABASE_URL="postgresql://postgres:$${PG_PASS}@postgres:5432/defectdojo"
        exec /entrypoint-celery-worker.sh
    networks:
      - backend
    logging: *dojo-logging
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 256M

  # ─── Celery beat (scheduler) ───────────────────────────────────────────────────
  dojo-celery-beat:
    image: localhost:5000/defectdojo-django:latest
    volumes: *dojo-volumes
    environment: *dojo-env
    secrets:
      - dojo_secret_key
      - postgres_password
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        export DD_SECRET_KEY=$$(cat /run/secrets/dojo_secret_key 2>/dev/null || echo 'changeme-set-dojo_secret_key')
        PG_PASS=$$(cat /run/secrets/postgres_password)
        export DD_DATABASE_URL="postgresql://postgres:$${PG_PASS}@postgres:5432/defectdojo"
        exec /entrypoint-celery-beat.sh
    networks:
      - backend
    logging: *dojo-logging
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # ─── Initializer (one-shot, migrations + admin creation) ──────────────────────
  dojo-initializer:
    image: localhost:5000/defectdojo-django:latest
    volumes: *dojo-volumes
    environment:
      DD_CELERY_BROKER_URL: redis://redis:6379/1
      DD_ALLOWED_HOSTS: "defectdojo,localhost"
      DD_INITIALIZE: "True"
      DD_ADMIN_USER: admin
      DD_SAML2_ENABLED: "False"
      DD_SESSION_COOKIE_SECURE: "False"
      DD_CSRF_COOKIE_SECURE: "False"
      DD_SECURE_SSL_REDIRECT: "False"
      DD_TRACK_MIGRATIONS: "True"
    secrets:
      - dojo_secret_key
      - dojo_admin_password
      - postgres_password
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        export DD_SECRET_KEY=$$(cat /run/secrets/dojo_secret_key 2>/dev/null || echo 'changeme-set-dojo_secret_key')
        export DD_ADMIN_PASSWORD=$$(cat /run/secrets/dojo_admin_password 2>/dev/null || echo 'changeme')
        PG_PASS=$$(cat /run/secrets/postgres_password)
        export DD_DATABASE_URL="postgresql://postgres:$${PG_PASS}@postgres:5432/defectdojo"
        export PGPASSWORD="$${PG_PASS}"
        exec /entrypoint-initializer.sh
    networks:
      - backend
    logging: *dojo-logging
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ─── Triage agent (LLM-powered via Ollama/Mistral) ───────────────────────────
  dojo-triage:
    image: ${IMAGE_REGISTRY:-localhost:5000}/dojo-triage:latest
    environment:
      DEFECTDOJO_URL: http://defectdojo-nginx:8080
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: mistral:7b-instruct
      DRY_RUN: "false"
      SCHEDULE_HOURS: "6"
      BATCH_SIZE: "100"
      METRICS_PORT: "9303"
      RETRIAGE_DAYS: "7"
    secrets:
      - dojo_api_token
    networks:
      - backend
      - monitoring
    logging: *dojo-logging
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 30s
        max_attempts: 5
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M
      labels:
        - "prometheus.enable=true"
        - "prometheus.port=9303"
        - "prometheus.path=/metrics"

secrets:
  postgres_password:
    external: true
  dojo_api_token:
    external: true
  dojo_secret_key:
    external: true
  dojo_admin_password:
    external: true
  karacho_secret_key:
    external: true
  telegram_bot_token:
    external: true
  telegram_alert_chat_id:
    external: true
  anthropic_api_key:
    external: true
  protonvpn_ovpn:
    external: true
  protonvpn_auth:
    external: true
  fly_api_token:
    external: true
  msf_rpc_password:
    external: true
