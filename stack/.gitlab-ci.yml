variables:
  STACK_NAME: "mon-app"
  COMPOSE_FILE: "docker-compose.yml"
  COMPOSE_FILE_PROD: "docker-compose.prod.yml"
  REGISTRY: "registry.bojemoi.lab"
  IMAGE_TAG: "${CI_COMMIT_SHORT_SHA}"

stages:
  - validate
  - build
  - test
  - security
  - deploy
  - verify
  - notify

# Template pour les jobs de déploiement
.deploy_template: &deploy_template
  tags:
    - swarm
    - deploy
  before_script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${REGISTRY}
  after_script:
    - docker logout ${REGISTRY}

# Validation de la syntaxe
validate:syntax:
  stage: validate
  script:
    - docker-compose -f ${COMPOSE_FILE} config --quiet
    - docker-compose -f ${COMPOSE_FILE_PROD} config --quiet
    - echo "✅ Syntaxe validée"
  only:
    - branches

# Validation des variables d'environnement requises
validate:env:
  stage: validate
  script:
    - |
      required_vars=("POSTGRES_PASSWORD" "REDIS_PASSWORD" "API_KEY")
      for var in "${required_vars[@]}"; do
        if [ -z "${!var}" ]; then
          echo "❌ Variable manquante: $var"
          exit 1
        fi
      done
    - echo "✅ Variables validées"
  only:
    - main

# Build des images
build:images:
  stage: build
  script:
    - docker-compose -f ${COMPOSE_FILE} build
    - docker-compose -f ${COMPOSE_FILE} push
    - echo "✅ Images construites et pushées"
  only:
    - main
    - develop

# Tests unitaires
test:unit:
  stage: test
  script:
    - docker-compose -f ${COMPOSE_FILE} run --rm app npm test
    - echo "✅ Tests unitaires passés"
  only:
    - branches

# Tests d'intégration
test:integration:
  stage: test
  script:
    - docker-compose -f ${COMPOSE_FILE} up -d
    - sleep 10
    - docker-compose -f ${COMPOSE_FILE} exec -T app npm run test:integration
    - docker-compose -f ${COMPOSE_FILE} down
    - echo "✅ Tests d'intégration passés"
  only:
    - main
    - develop

# Scan Trivy — misconfigurations dans TOUS les Dockerfiles du repo
security:trivy:dockerfile:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    # Bloquer sur HIGH/CRITICAL
    - trivy config
        --exit-code 1
        --severity HIGH,CRITICAL
        --format sarif
        --output trivy-dockerfile-report.sarif
        .
    # Reporter LOW/MEDIUM sans bloquer
    - trivy config
        --exit-code 0
        --severity LOW,MEDIUM
        .
  artifacts:
    reports:
      sast: trivy-dockerfile-report.sarif
    paths:
      - trivy-dockerfile-report.sarif
    expire_in: 1 week
  only:
    - main
    - develop

# Scan Trivy — toutes les images localhost:5000 référencées dans les stacks
security:trivy:images:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  variables:
    TRIVY_NO_PROGRESS: "true"
    TRIVY_CACHE_DIR: ".trivycache"
    DOCKER_HOST: "tcp://docker:2375"
  services:
    - docker:dind
  cache:
    key: trivy-db
    paths:
      - .trivycache/
  script:
    - |
      # Extraire toutes les images localhost:5000 uniques depuis les stacks
      IMAGES=$(grep -h 'image: localhost:5000/' stack/*.yml \
        | awk '{print $2}' \
        | sort -u)

      echo "Images a scanner :"
      echo "$IMAGES"

      FAILED=0

      for IMAGE in $IMAGES; do
        echo ""
        echo "=== Scan: $IMAGE ==="

        # Pull l'image depuis le registry local
        docker pull "$IMAGE" 2>/dev/null || {
          echo "WARN: impossible de puller $IMAGE, skipped"
          continue
        }

        # CRITICAL → bloquant
        trivy image \
          --exit-code 1 \
          --severity CRITICAL \
          --ignore-unfixed \
          --format table \
          "$IMAGE" || FAILED=1

        # HIGH → non bloquant, loggé
        trivy image \
          --exit-code 0 \
          --severity HIGH \
          --ignore-unfixed \
          --format table \
          "$IMAGE"
      done

      # Rapport SARIF global (toutes images, toutes sévérités)
      trivy image \
        --exit-code 0 \
        --severity HIGH,CRITICAL \
        --ignore-unfixed \
        --format sarif \
        --output trivy-images-report.sarif \
        $(echo "$IMAGES" | tr '\n' ' ') 2>/dev/null || true

      exit $FAILED
  artifacts:
    reports:
      sast: trivy-images-report.sarif
    paths:
      - trivy-images-report.sarif
    expire_in: 1 week
    when: always
  dependencies:
    - build:images
  only:
    - main

# Scan OWASP ZAP
security:zap:
  stage: security
  script:
    - bash scripts/security/zap-scan.sh
    - echo "✅ Scan ZAP terminé"
  only:
    - main
  artifacts:
    reports:
      junit: zap-report.xml
    paths:
      - zap-report.html
    expire_in: 1 week
  allow_failure: true

# Upload des résultats vers Faraday
security:faraday:
  stage: security
  script:
    - |
      curl -X POST http://faraday.bojemoi.lab/api/v3/ws/${STACK_NAME}/upload \
        -H "Authorization: Token ${FARADAY_TOKEN}" \
        -F "file=@zap-report.xml"
    - echo "✅ Résultats uploadés vers Faraday"
  dependencies:
    - security:zap
  only:
    - main

# Déploiement en staging
deploy:staging:
  <<: *deploy_template
  stage: deploy
  script:
    - bash scripts/deploy.sh ${STACK_NAME}-staging ${COMPOSE_FILE}
    - echo "✅ Déployé en staging"
  environment:
    name: staging
    url: https://${STACK_NAME}-staging.bojemoi.lab
  only:
    - develop

# Déploiement en production
deploy:production:
  <<: *deploy_template
  stage: deploy
  script:
    - bash scripts/deploy.sh ${STACK_NAME} ${COMPOSE_FILE_PROD}
    - echo "✅ Déployé en production"
  environment:
    name: production
    url: https://${STACK_NAME}.bojemoi.lab
    on_stop: rollback:production
  only:
    - main
  when: manual  # Déploiement manuel requis

# Rollback production
rollback:production:
  <<: *deploy_template
  stage: deploy
  script:
    - bash scripts/rollback.sh ${STACK_NAME}
    - echo "🔄 Rollback effectué"
  environment:
    name: production
    action: stop
  only:
    - main
  when: manual

# Vérification post-déploiement
verify:health:
  stage: verify
  script:
    - bash scripts/health-check.sh ${STACK_NAME}
    - echo "✅ Health check passé"
  dependencies:
    - deploy:production
  only:
    - main

# Vérification Prometheus
verify:prometheus:
  stage: verify
  script:
    - |
      # Vérifier que les métriques remontent
      response=$(curl -s http://prometheus.bojemoi.lab/api/v1/query?query=up{job="${STACK_NAME}"})
      if echo "$response" | grep -q '"value":\[.*,"1"\]'; then
        echo "✅ Métriques Prometheus OK"
      else
        echo "❌ Métriques Prometheus manquantes"
        exit 1
      fi
  dependencies:
    - deploy:production
  only:
    - main

# Notification Grafana
notify:grafana:
  stage: notify
  script:
    - bash scripts/notify.sh grafana
    - echo "📊 Annotation Grafana créée"
  dependencies:
    - deploy:production
  only:
    - main
  when: always

# Notification Slack/Email
notify:team:
  stage: notify
  script:
    - bash scripts/notify.sh team
    - echo "📧 Équipe notifiée"
  only:
    - main
  when: on_success

post_deploy_monitoring:
  stage: deploy
  script:
    - |
      # Notification Grafana
      curl -X POST http://grafana.bojemoi.lab/api/annotations \
        -H "Content-Type: application/json" \
        -d "{\"text\":\"Déploiement ${STACK_NAME} - ${CI_COMMIT_SHORT_SHA}\",\"tags\":[\"deployment\",\"${STACK_NAME}\"]}"
  after_script:
    - docker stack ps ${STACK_NAME} --no-trunc

