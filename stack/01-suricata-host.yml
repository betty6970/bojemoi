# Suricata IDS/IPS — standalone docker compose (NOT Swarm)
# Requires network_mode: host for real packet capture on eth0.
# Deploy on each node: docker compose -f stack/01-suricata-host.yml up -d

services:
  suricata:
    image: ${IMAGE_REGISTRY:-localhost:5000}/suricata:latest
    container_name: suricata
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_NICE
      - NET_RAW
    environment:
      - SURICATA_OPTIONS=-i eth0 --set stream.reassembly.depth=0 --set detect.profile=low
    volumes:
      - ${BOJEMOI_BASE_PATH:-/opt/bojemoi}/volumes/suricata/logs:/var/log/suricata
      - ${BOJEMOI_BASE_PATH:-/opt/bojemoi}/volumes/suricata:/etc/suricata
      - ${BOJEMOI_BASE_PATH:-/opt/bojemoi}/volumes/suricata/run:/var/run/suricata
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  eve-cleaner:
    image: ${IMAGE_REGISTRY:-localhost:5000}/alpine:latest
    volumes:
      - ${BOJEMOI_BASE_PATH:-/opt/bojemoi}/volumes/suricata/logs:/var/log/suricata
    environment:
      KEEP_HOURS: "24"
    command: >
      sh -c "while true; do
        find /var/log/suricata -name 'eve.json' -size +5G -exec truncate -s 0 {} \; 2>/dev/null;
        find /var/log/suricata -name 'fast.log' -size +500M -exec truncate -s 0 {} \; 2>/dev/null;
        find /var/log/suricata -name 'stats.log' -size +500M -exec truncate -s 0 {} \; 2>/dev/null;
        find /var/log/suricata -name 'eve.*.json' -mmin +$$((KEEP_HOURS * 60)) -delete 2>/dev/null;
        echo \"[eve-cleaner] done (keep=$${KEEP_HOURS}h)\";
        sleep 3600;
      done"
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: '0.05'
          memory: 32M
        reservations:
          cpus: '0.01'
          memory: 8M

  suricata-attack-enricher:
    image: ${IMAGE_REGISTRY:-localhost:5000}/suricata-attack-enricher:latest
    container_name: suricata-attack-enricher
    network_mode: host
    networks:
      - backend
    volumes:
      - ${BOJEMOI_BASE_PATH:-/opt/bojemoi}/volumes/suricata/logs:/var/log/suricata:ro
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${ML_THREAT_DBNAME:-bojemoi_threat_intel}
      - DB_USER=postgres
      - DB_PASSWORD_FILE=/run/secrets/postgres_password
    secrets:
      - postgres_password
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - suricata

networks:
  backend:
    external: true

secrets:
  postgres_password:
    external: true
