# Suricata IDS/IPS — standalone docker compose (NOT Swarm)
# Requires network_mode: host for real packet capture on eth0.
# Deploy on each node: docker compose -f stack/01-suricata-host.yml up -d

services:
  suricata:
    image: ${IMAGE_REGISTRY:-localhost:5000}/suricata:latest
    container_name: suricata
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_NICE
      - NET_RAW
    environment:
      - SURICATA_OPTIONS=-i eth0 --set stream.reassembly.depth=0 --set detect.profile=low
    volumes:
      - ${BOJEMOI_BASE_PATH:-/opt/bojemoi}/volumes/suricata/logs:/var/log/suricata
      - ${BOJEMOI_BASE_PATH:-/opt/bojemoi}/volumes/suricata:/etc/suricata
      - ${BOJEMOI_BASE_PATH:-/opt/bojemoi}/volumes/suricata/run:/var/run/suricata
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  suricata-exporter:
    image: ${IMAGE_REGISTRY:-localhost:5000}/suricata_exporter:latest
    container_name: suricata-exporter
    volumes:
      - ${BOJEMOI_BASE_PATH:-/opt/bojemoi}/volumes/suricata/logs:/var/log/suricata:ro
      - ${BOJEMOI_BASE_PATH:-/opt/bojemoi}/volumes/suricata/run:/var/run/suricata:ro
    ports:
      - "9917:9917"
    command:
      - '--suricata.socket-path=/var/run/suricata/suricata-command.socket'
    restart: unless-stopped
    depends_on:
      - suricata
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  eve-cleaner:
    image: ${IMAGE_REGISTRY:-localhost:5000}/alpine:latest
    container_name: eve-cleaner
    volumes:
      - ${BOJEMOI_BASE_PATH:-/opt/bojemoi}/volumes/suricata/logs:/var/log/suricata
    environment:
      # Nombre d'heures de logs tournés à conserver (suricata crée eve.TIMESTAMP.json toutes les heures)
      KEEP_HOURS: "48"
    command: >
      sh -c "while true; do
        LOGDIR=/var/log/suricata;
        NOW=$$(date +%s);
        DELETED=0;
        SIZE_BEFORE=$$(du -sk $$LOGDIR 2>/dev/null | cut -f1);
        for f in $$LOGDIR/eve.*.json $$LOGDIR/fast.log.* $$LOGDIR/stats.log.*; do
          [ -f \"$$f\" ] || continue;
          MTIME=$$(stat -c %Y \"$$f\" 2>/dev/null || stat -f %m \"$$f\" 2>/dev/null);
          AGE_H=$$(( (NOW - MTIME) / 3600 ));
          if [ \"$$AGE_H\" -ge \"$$KEEP_HOURS\" ]; then
            rm -f \"$$f\";
            DELETED=$$(( DELETED + 1 ));
          fi;
        done;
        SIZE_AFTER=$$(du -sk $$LOGDIR 2>/dev/null | cut -f1);
        FREED=$$(( (SIZE_BEFORE - SIZE_AFTER) / 1024 ));
        echo \"[eve-cleaner] $$(date -Iseconds) keep=$${KEEP_HOURS}h deleted=$${DELETED} freed=$${FREED}MB dir_size=$$(du -sh $$LOGDIR 2>/dev/null | cut -f1)\";
        sleep 3600;
      done"
    restart: unless-stopped
    depends_on:
      - suricata
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "2"

  # suricata-attack-enricher runs as a global Swarm service (needs overlay network + secrets)
  # See stack/01-service-hl.yml
