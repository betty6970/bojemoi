# Stack Nym Mixnet — Proxy SOCKS5 anonymisant via réseau Nym public
# Rôle : anonymiser le trafic HTTP/TCP sortant (nuclei, OSINT) via le mixnet Sphinx multi-hop
#
# Pré-requis :
#   export NYM_PROVIDER=<Network Requester address>
#   # Obtenir une adresse active :
    # curl -4 -s  "https://mainnet-node-status-api.nymtech.cc/v2/services?size=50" |       jq -r '
      .items[] |…)
#
# Build :
#   docker build -f nym-proxy/Dockerfile -t localhost:5000/nym-proxy:latest nym-proxy/
#   docker push localhost:5000/nym-proxy:latest
#
# Deploy :
#   docker stack deploy -c stack/41-service-nym.yml nym --prune --resolve-image always

networks:
  scan_net:
    name: borodino_scan_net
    external: true

volumes:
  nym_config:
    driver: local

services:

  nym-proxy:
    image: ${IMAGE_REGISTRY:-localhost:5000}/nym-proxy:latest
    hostname: nym-proxy
    networks:
      - scan_net
    environment:
      - NYM_ID=${NYM_ID:-bojemoi-lab}
      - NYM_PROVIDER=$${NYM_PROVIDER:?NYM_PROVIDER is required}
      - NYM_PORT=1080
    volumes:
      - nym_config:/root/.nym
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "1080"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
        max_replicas_per_node: 1
      restart_policy:
        condition: on-failure
        delay: 15s
        max_attempts: 5
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
