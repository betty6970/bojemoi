# DVAR - Damn Vulnerable ARM Router
# Cible IoT ARM pour tests d'exploitation — lab only
#
# Pré-requis :
#   docker network create --driver overlay --attachable iot (si absent)
#
# Deploy:
#   docker stack deploy -c stack/56-service-dvar.yml dvar --prune --resolve-image always

networks:
  pentest:
    external: true
  iot_network:
    name: iot
    driver: overlay
    attachable: true

services:

  dvar:
    image: ${IMAGE_REGISTRY:-localhost:5000}/dvar:latest

    environment:
      # IP du container pour auto-enregistrement dans msf DB
      # La valeur est résolue au démarrage via hostname -I dans l'entrypoint
      DVAR_IP: ""          # laissé vide → l'entrypoint résout via hostname -I
      MSF_PG_HOST: "postgres"
      MSF_PG_USER: "postgres"
      MSF_PG_PASS: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      MSF_PG_DB:   "msf"

    networks:
      - pentest
      - iot_network

    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 30s
        max_attempts: 3
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
