# Bojemoi Lab - Nightly maintenance stack
# docker-cleanup: global service (one per node), runs docker system prune at 03:00

services:
  docker-cleanup:
    image: docker:27-cli
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "0 3 * * * docker system prune -af --filter until=24h >> /proc/1/fd/1 2>&1" \
          > /etc/crontabs/root
        crond -f -l 6
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOCKER_HOST: "unix:///var/run/docker.sock"
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
        delay: 10s
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
