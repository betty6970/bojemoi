# Bojemoi Lab - ML Threat Intelligence Stack
# IoC analysis with ML classification and OSINT integration

x-deploy-template: &deploy-template
  placement:
    constraints:
      - node.role == worker
  restart_policy:
    condition: on-failure
    delay: 5s
    max_attempts: 3
  update_config:
    parallelism: 1
    delay: 10s
    failure_action: rollback
  resources:
    limits:
      cpus: '1.0'
      memory: 1G
    reservations:
      cpus: '0.25'
      memory: 512M

networks:
  backend:
    external: true
  proxy:
    external: true

volumes:
  ml-threat-intel-models:
    driver: local

services:
  # ML Threat Intelligence API
  ml-threat-intel-api:
    image: ${IMAGE_REGISTRY:-localhost:5000}/ml-threat-intel:latest
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${ML_THREAT_DBNAME:-bojemoi_threat_intel}
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      VT_API_KEY_FILE: /run/secrets/vt_api_key
      ABUSEIPDB_API_KEY_FILE: /run/secrets/abuseipdb_api_key
      OTX_API_KEY_FILE: /run/secrets/otx_api_key
      SHODAN_API_KEY_FILE: /run/secrets/shodan_api_key
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - ml-threat-intel-models:/app/models
      - /opt/bojemoi-ml-threat/config:/app/config:ro
    networks:
      - backend
      - proxy
    secrets:
      - vt_api_key
      - abuseipdb_api_key
      - otx_api_key
      - shodan_api_key
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      <<: *deploy-template
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.ml-threat-intel.rule=Host(`threat-intel.${LAB_DOMAIN:-bojemoi.lab}.local`)"
        - "traefik.http.routers.ml-threat-intel.entrypoints=web"
        - "traefik.http.services.ml-threat-intel.loadbalancer.server.port=8001"

secrets:
  vt_api_key:
    external: true
  abuseipdb_api_key:
    external: true
  otx_api_key:
    external: true
  shodan_api_key:
    external: true
