# Vigie - CERT-FR Security Bulletin Monitor
# Polls ANSSI RSS feeds, filters by product watchlist, alerts via Telegram + Alertmanager

networks:
  backend:
    external: true
  scan_net:
    external: true
    name: borodino_scan_net

configs:
  route_setup_v1:
    external: true

secrets:
  telegram_bot_token:
    external: true
  telegram_alert_chat_id:
    external: true
  postgres_password:
    external: true

services:
  vigie:
    image: ${IMAGE_REGISTRY:-localhost:5000}/vigie:latest
    hostname: vigie
    cap_add:
      - NET_ADMIN
    configs:
      - source: route_setup_v1
        target: /usr/bin/route-setup.sh
        mode: 0755
    environment:
      SCAN_GATEWAY_HOST: wg-gateway
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: postgres
      # PG_PASSWORD read from /run/secrets/postgres_password by app
      PG_DATABASE: vigie
      FEED_URLS: >-
        https://cert.ssi.gouv.fr/alerte/feed/,
        https://cert.ssi.gouv.fr/avis/feed/,
        https://cert.ssi.gouv.fr/ioc/feed/
      POLL_INTERVAL: "300"
      WATCHLIST: >-
        linux,docker,postgresql,postgres,traefik,grafana,prometheus,
        suricata,nginx,python,alpine,openssl,openssh,git,curl,
        ruby,node,fastapi,redis,loki
      ALERTMANAGER_WEBHOOK_URL: "http://alertmanager:9093/api/v1/alerts"
      METRICS_PORT: "9301"
    secrets:
      - telegram_bot_token
      - telegram_alert_chat_id
      - postgres_password
    networks:
      - backend
      - scan_net
    command: ["/usr/bin/route-setup.sh", "python", "-m", "vigie"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M
      labels:
        - "prometheus.enable=true"
        - "prometheus.port=9301"
        - "prometheus.path=/metrics"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9301/metrics')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
