  # =========================================================================
  # SERVICE:  rsync 
  # ========================================================================

  rsync-master:
    <<: *mode-template  # H..rite du template de base
    image: ${IMAGE_REGISTRY:-localhost:5000}/koursk-2:latest
    hostname: rsync-master
    # ports removed - internal backup service
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      <<: *deploy-template  # H..rite du template de d..
      replicas: 1 
      placement:
        constraints:
          - node.role == manager
      labels:
         - prometheus.enable=false
         - prometheus.label.team=infrastructure
         - prometheus.label.component=backup-master
         - prometheus.label.stack=base
         - prometheus.label.tier=backup
    configs:
       - source: rsync_rsyncd
         target: /etc/rsyncd.conf
       - source: rsync_jobs
         target: /config/rsync_jobs.json
    volumes:
       - type: bind
         source: ${BOJEMOI_BASE_PATH:-/opt/bojemoi}
         target: ${BOJEMOI_BASE_PATH:-/opt/bojemoi}
       - type: bind
         source: /opt/bojemoi_boot
         target: /opt/bojemoi_boot
       - type: bind
         source: /opt/bojemoi-ml-threat
         target: /opt/bojemoi-ml-threat
       - type: bind
         source: /opt/bojemoi-telegram
         target: /opt/bojemoi-telegram
       - ssh_keys:/root/.ssh:ro
       - shared_logs:/var/log/rsync
    environment:
       - MODULE=swarm_data
       - DATA_PATH=${BOJEMOI_BASE_PATH:-/opt/bojemoi}
       - RSYNC_MODE=master
       - SYNC_INTERVAL=300
       - REMOTE_HOSTS=rsync-slave
       - DOCKER_HOST=tcp://docker-socket-proxy:2375
    networks:
       - monitoring
       - rsync_network
       - backend
    command: ["/scripts/rsync-start.sh"]

  rsync-slave:
    <<: *mode-template  # H..rite du template de base
    hostname: rsync-slave-
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      <<: *deploy-template  # H..rite du template de d..
      labels:
          - prometheus.enable=false  # Pas de metrics intégrées
          - prometheus.label.team=infrastructure
          - prometheus.label.component=backup-slave
          - prometheus.label.stack=base
          - prometheus.label.tier=backup
      mode: global
      placement:
        constraints:
          - node.labels.rsync.slave == true
      update_config:
        parallelism: 1
        delay: 10s
    configs:
       - source: rsync_rsyncd
         target: /etc/rsyncd.conf
       - source: rsync_jobs
         target: /config/rsync_jobs.json
    volumes:
      - type: bind
        source: /opt/bojemoi
        target: /opt/bojemoi
      - type: bind
        source: /opt/bojemoi_boot
        target: /opt/bojemoi_boot
      - type: bind
        source: /opt/bojemoi-ml-threat
        target: /opt/bojemoi-ml-threat
      - type: bind
        source: /opt/bojemoi-telegram
        target: /opt/bojemoi-telegram
      - ssh_keys:/root/.ssh
      - shared_logs:/var/log/rsync
    environment:
      - RSYNC_MODE=slave
      - MASTER_HOST=rsync-master
      - DATA_PATH=/opt/bojemoi
    networks:
      - rsync_network
    command: ["/scripts/rsync-slave.sh"]

