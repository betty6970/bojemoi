# DefectDojo Stack — remplace 70-service-faraday-triage.yml + service faraday de borodino
#
# Pre-deploy:
#   docker node update --label-add defectdojo=true meta-68
#   echo "$(openssl rand -hex 32)" | docker secret create dojo_secret_key -
#   echo "admin_password_here" | docker secret create dojo_admin_password -
#   # Après 1er login UI, récupérer le token API et:
#   echo "your_api_token" | docker secret create dojo_api_token -
#   echo "your_api_token" | docker secret create mcp_dojo_token -
#   echo "your_api_token" | docker secret create medved_dojo_token -
#
# Deploy:
#   PG_PASS=<pg_password> docker stack deploy -c stack/70-service-defectdojo.yml dojo --prune --resolve-image always
#
# Note: defectdojo-nginx et defectdojo-uwsgi doivent être sur le même nœud
#       (volume socket partagé) → tous deux contraints à node.labels.defectdojo == true

networks:
  backend:
    external: true
  pentest:
    external: true
  proxy:
    external: true
  monitoring:
    external: true

volumes:
  dojo-uwsgi-socket:
    driver: local
  dojo-media:
    driver: local

secrets:
  dojo_secret_key:
    external: true
  dojo_admin_password:
    external: true
  dojo_api_token:
    external: true
  postgres_password:
    external: true

x-dojo-env: &dojo-env
  DD_DATABASE_URL: postgresql://postgres:${PG_PASS:?PG_PASS required}@postgres:5432/defectdojo
  PGPASSWORD: "${PG_PASS:?PG_PASS required}"
  DD_CELERY_BROKER_URL: redis://redis:6379/1
  DD_ALLOWED_HOSTS: "defectdojo,defectdojo-nginx,dojo.bojemoi.lab,localhost,127.0.0.1"
  DD_DEBUG: "False"
  DD_DJANGO_METRICS_ENABLED: "True"
  DD_SAML2_ENABLED: "False"
  DD_SESSION_COOKIE_SECURE: "False"
  DD_CSRF_COOKIE_SECURE: "False"
  DD_SECURE_SSL_REDIRECT: "False"
  DD_TRACK_MIGRATIONS: "True"
  DD_TIME_ZONE: "UTC"
  DD_WHITENOISE: "True"

x-dojo-volumes: &dojo-volumes
  - dojo-media:/app/media
  - dojo-uwsgi-socket:/run/uwsgi

x-dojo-logging: &dojo-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ─── HTTP frontend (nginx → uwsgi socket) ────────────────────────────────────
  defectdojo-nginx:
    image: defectdojo/defectdojo-nginx:latest
    volumes:
      - dojo-media:/usr/share/nginx/html/media:ro
      - dojo-uwsgi-socket:/run/uwsgi
    networks:
      - backend
      - pentest
      - proxy
    environment:
      NGINX_METRICS_ENABLED: "true"
    logging: *dojo-logging
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.defectdojo == true
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
      labels:
        - traefik.enable=true
        - traefik.docker.network=proxy
        - traefik.http.routers.defectdojo.rule=Host(`dojo.bojemoi.lab`)
        - traefik.http.routers.defectdojo.entrypoints=websecure
        - traefik.http.routers.defectdojo.tls=true
        - traefik.http.services.defectdojo.loadbalancer.server.port=8080

  # ─── Django uWSGI application ─────────────────────────────────────────────────
  defectdojo-uwsgi:
    image: defectdojo/defectdojo-django:latest
    volumes: *dojo-volumes
    environment: *dojo-env
    secrets:
      - dojo_secret_key
      - postgres_password
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        export DD_SECRET_KEY=$$(cat /run/secrets/dojo_secret_key 2>/dev/null || echo 'changeme-set-dojo_secret_key')
        exec /entrypoint-uwsgi.sh
    networks:
      backend:
        aliases:
          - uwsgi
      pentest:
        aliases:
          - uwsgi
    logging: *dojo-logging
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.defectdojo == true
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ─── Celery worker ─────────────────────────────────────────────────────────────
  dojo-celery-worker:
    image: defectdojo/defectdojo-django:latest
    volumes: *dojo-volumes
    environment: *dojo-env
    secrets:
      - dojo_secret_key
      - postgres_password
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        export DD_SECRET_KEY=$$(cat /run/secrets/dojo_secret_key 2>/dev/null || echo 'changeme-set-dojo_secret_key')
        exec /entrypoint-celery-worker.sh
    networks:
      - backend
    logging: *dojo-logging
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 256M

  # ─── Celery beat (scheduler) ───────────────────────────────────────────────────
  dojo-celery-beat:
    image: defectdojo/defectdojo-django:latest
    volumes: *dojo-volumes
    environment: *dojo-env
    secrets:
      - dojo_secret_key
      - postgres_password
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        export DD_SECRET_KEY=$$(cat /run/secrets/dojo_secret_key 2>/dev/null || echo 'changeme-set-dojo_secret_key')
        exec /entrypoint-celery-beat.sh
    networks:
      - backend
    logging: *dojo-logging
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # ─── Initializer (one-shot, exécute les migrations + crée admin) ───────────────
  dojo-initializer:
    image: defectdojo/defectdojo-django:latest
    volumes: *dojo-volumes
    environment:
      DD_DATABASE_URL: postgresql://postgres:${PG_PASS:?PG_PASS required}@postgres:5432/defectdojo
      DD_CELERY_BROKER_URL: redis://redis:6379/1
      DD_ALLOWED_HOSTS: "defectdojo,localhost"
      PGPASSWORD: "${PG_PASS:?PG_PASS required}"
      DD_INITIALIZE: "True"
      DD_ADMIN_USER: admin
      DD_SAML2_ENABLED: "False"
      DD_SESSION_COOKIE_SECURE: "False"
      DD_CSRF_COOKIE_SECURE: "False"
      DD_SECURE_SSL_REDIRECT: "False"
      DD_TRACK_MIGRATIONS: "True"
    secrets:
      - dojo_secret_key
      - dojo_admin_password
      - postgres_password
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        export DD_SECRET_KEY=$$(cat /run/secrets/dojo_secret_key 2>/dev/null || echo 'changeme-set-dojo_secret_key')
        export DD_ADMIN_PASSWORD=$$(cat /run/secrets/dojo_admin_password 2>/dev/null || echo 'changeme')
        exec /entrypoint-initializer.sh
    networks:
      - backend
    logging: *dojo-logging
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ─── Triage agent (ex faraday-triage, utilise désormais l'API REST DefectDojo) ─
  dojo-triage:
    image: ${IMAGE_REGISTRY:-localhost:5000}/dojo-triage:latest
    environment:
      DEFECTDOJO_URL: http://defectdojo-nginx:8080
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: mistral:7b-instruct
      DRY_RUN: "false"
      SCHEDULE_HOURS: "6"
      BATCH_SIZE: "100"
      METRICS_PORT: "9303"
      RETRIAGE_DAYS: "7"
    secrets:
      - dojo_api_token
    networks:
      - backend
      - monitoring
    logging: *dojo-logging
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 30s
        max_attempts: 5
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M
      labels:
        - "prometheus.enable=true"
        - "prometheus.port=9303"
        - "prometheus.path=/metrics"
