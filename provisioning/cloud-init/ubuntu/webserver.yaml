#cloud-config
# Template webserver pour Ubuntu

hostname: {{ hostname }}
fqdn: {{ fqdn }}

# Utilisateur admin
users:
  - name: admin
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMyy5HLUQH9fh+vemlelFMWs8UOgkiT0M3qVbUeKvZO1 docker@meta-76

# Packages à installer
packages:
  - curl
  - wget
  - git
  - nginx
  - docker.io
  - docker-compose

# Mise à jour système
package_update: true
package_upgrade: true

# Configuration Nginx
write_files:
  - path: /etc/nginx/sites-available/default
    content: |
      server {
          listen 80;
          server_name {{ vm_name }};

          location / {
              proxy_pass http://localhost:8080;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
          }

          location /health {
              return 200 'healthy';
              add_header Content-Type text/plain;
          }
      }

  - path: /etc/environment
    content: |
      ENVIRONMENT={{ environment }}
      VM_NAME={{ vm_name }}
      HOSTNAME={{ hostname }}

# Commandes à exécuter au démarrage
runcmd:
  # Configuration Nginx
  - systemctl enable nginx
  - systemctl start nginx

  # Configuration Docker
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker admin

  # Log de complétion
  - echo "VM {{ vm_name }} initialized successfully in {{ environment }} environment" > /var/log/cloud-init-complete.log
  - echo "Deployment completed at $(date)" >> /var/log/cloud-init-complete.log

# Message final
final_message: "Cloud-init completed for {{ vm_name }} after $UPTIME seconds"
