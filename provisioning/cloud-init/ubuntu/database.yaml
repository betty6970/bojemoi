#cloud-config
# Template database pour Ubuntu

hostname: {{ hostname }}
fqdn: {{ fqdn }}

# Utilisateur admin
users:
  - name: admin
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMyy5HLUQH9fh+vemlelFMWs8UOgkiT0M3qVbUeKvZO1 docker@meta-76

# Packages à installer
packages:
  - curl
  - wget
  - git
  - postgresql
  - postgresql-contrib

# Mise à jour système
package_update: true
package_upgrade: true

# Configuration PostgreSQL
write_files:
  - path: /etc/postgresql/15/main/conf.d/custom.conf
    content: |
      # Configuration pour {{ environment }}
      listen_addresses = '*'
      max_connections = 100
      shared_buffers = 256MB
      work_mem = 4MB
      maintenance_work_mem = 64MB
      effective_cache_size = 768MB

  - path: /etc/postgresql/15/main/pg_hba.conf
    append: true
    content: |
      # Allow connections from internal network
      host    all             all             10.0.0.0/8              scram-sha-256
      host    all             all             172.16.0.0/12           scram-sha-256
      host    all             all             192.168.0.0/16          scram-sha-256

  - path: /etc/environment
    content: |
      ENVIRONMENT={{ environment }}
      VM_NAME={{ vm_name }}
      DB_NAME={{ db_name | default('bojemoi') }}

# Commandes à exécuter au démarrage
runcmd:
  # Configuration PostgreSQL
  - systemctl enable postgresql
  - systemctl start postgresql

  # Création base de données
  - sleep 5
  - sudo -u postgres psql -c "CREATE DATABASE {{ db_name | default('bojemoi') }};"
  - sudo -u postgres psql -c "CREATE USER dbuser WITH ENCRYPTED PASSWORD 'changeme';"
  - sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ db_name | default('bojemoi') }} TO dbuser;"

  # Redémarrer pour appliquer pg_hba.conf
  - systemctl restart postgresql

  # Log de complétion
  - echo "Database {{ vm_name }} initialized in {{ environment }} environment" > /var/log/cloud-init-complete.log
  - echo "Deployment completed at $(date)" >> /var/log/cloud-init-complete.log

# Message final
final_message: "Database server {{ vm_name }} ready after $UPTIME seconds"
