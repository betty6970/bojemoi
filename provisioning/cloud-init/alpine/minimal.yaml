#cloud-config
# Template minimal pour Alpine Linux

hostname: {{ hostname }}
fqdn: {{ fqdn }}

# Utilisateur admin
users:
  - name: admin
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/ash
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMyy5HLUQH9fh+vemlelFMWs8UOgkiT0M3qVbUeKvZO1 docker@meta-76

# Packages minimaux
packages:
  - curl
  - wget
  - git
  - htop
  - vim
  - xe-guest-utilities

# Mise à jour système
package_update: true
package_upgrade: true

# Configuration minimale
write_files:
  - path: /etc/environment
    content: |
      ENVIRONMENT={{ environment }}
      VM_NAME={{ vm_name }}
      HOSTNAME={{ hostname }}

# Commandes à exécuter au démarrage
runcmd:
  # XenServer guest tools — expose IP to XenStore so the orchestrator can read it
  - rc-update add xe-guest-utilities default
  - rc-service xe-guest-utilities start || true
  - echo "VM {{ vm_name }} initialized in {{ environment }} environment" > /var/log/cloud-init-complete.log
  - echo "Deployment completed at $(date)" >> /var/log/cloud-init-complete.log

# Message final
final_message: "Alpine minimal {{ vm_name }} ready after $UPTIME seconds"
